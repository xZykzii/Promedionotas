<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Promedios nms</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="/Promedionotas/manifest.json">
  <meta name="theme-color" content="#080811">
  <link rel="icon" href="/Promedionotas/icons/icon-192.png">

  <style>
    :root {
      --bg: #08080f;
      --surface: #0f0f1a;
      --card: #111120;
      --card-soft: #0d0d1a;
      --border: #1c1c2e;
      --border-light: #242436;
      --text: #e8e8f0;
      --text-soft: #8888aa;
      --text-muted: #4a4a66;
      --input-bg: #16162a;
      --input-border: #252540;
      --accent: #5b5bd6;
      --accent-hover: #7070e8;
      --accent-glow: rgba(91,91,214,0.18);
      --danger: #e54545;
      --danger-soft: rgba(229,69,69,0.1);
      --success: #22c55e;
      --warning: #f59e0b;
      --grade-fail: #ef4444;
      --grade-fail-bg: rgba(239,68,68,0.12);
      --grade-warn: #f59e0b;
      --grade-warn-bg: rgba(245,158,11,0.12);
      --grade-lime: #84cc16;
      --grade-lime-bg: rgba(132,204,22,0.12);
      --grade-good: #22c55e;
      --grade-good-bg: rgba(34,197,94,0.12);
      --r: 14px; --rs: 8px; --rx: 6px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: var(--bg); color: var(--text); min-height: 100vh; }

    .app { max-width: 920px; margin: 0 auto; padding: 16px 16px 60px; }

    /* ── Header ── */
    .app-header { text-align: center; padding: 28px 0 18px; }
    .app-header h1 {
      margin: 0;
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 50%, #6366f1 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .app-header p { margin: 5px 0 0; font-size: 0.78rem; color: var(--text-muted); }

    /* ── Auth bar ── */
    .auth-bar {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; flex-wrap: wrap;
      padding: 10px 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 16px;
    }
    .auth-status { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-soft); }
    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
      flex-shrink: 0; transition: background 0.3s;
    }
    .sync-dot.local  { background: var(--warning); }
    .sync-dot.synced { background: var(--success); }
    .sync-dot.saving { background: var(--accent); animation: blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    .auth-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    /* ── Buttons ── */
    button {
      border: none; border-radius: 999px;
      padding: 8px 16px; font-size: 0.85rem;
      cursor: pointer; font-weight: 600; transition: all 0.15s; letter-spacing: 0.01em;
    }
    .btn-primary  { background: var(--accent); color: #fff; box-shadow: 0 2px 10px rgba(91,91,214,.3); }
    .btn-primary:hover  { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-secondary{ background: var(--border-light); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover{ background: #2a2a42; }
    .btn-danger   { background: transparent; color: var(--danger); border: 1px solid rgba(229,69,69,.3); }
    .btn-danger:hover   { background: var(--danger-soft); }
    .btn-ghost    { background: transparent; color: var(--text-soft); border: 1px solid var(--border); }
    .btn-ghost:hover    { background: var(--border); color: var(--text); }
    .btn-mini { padding: 5px 10px; font-size: 0.75rem; }

    /* ── Top bar ── */
    .top-bar { margin-bottom: 16px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .import-label {
      display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; padding: 8px 16px;
      border-radius: 999px; background: var(--border-light);
      color: var(--text); border: 1px solid var(--border);
      transition: background 0.15s;
    }
    .import-label:hover { background: #2a2a42; }

    /* ── Global stats ── */
    .global-box {
      margin: 20px 0;
      padding: 20px 22px;
      border-radius: var(--r);
      background: linear-gradient(135deg, #0f0f1e, #161628);
      border: 1px solid var(--border-light);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 440px) { .global-box { grid-template-columns: 1fr; } }
    .global-stat-label {
      font-size: 0.68rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px;
    }
    .global-stat-value {
      font-size: 2.2rem; font-weight: 900; line-height: 1;
      transition: color 0.4s;
    }
    .global-stat-sub { font-size: 0.72rem; color: var(--text-soft); margin-top: 4px; }

    /* ── Semester list ── */
    .semester-list { display: flex; flex-direction: column; gap: 10px; }

    .semester-list-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; transition: border-color .2s;
    }
    .semester-list-card:hover { border-color: var(--border-light); }
    .semester-list-left { flex: 1; min-width: 0; }
    .semester-list-name { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .semester-list-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .semester-list-avg { font-size: 0.82rem; color: var(--text-soft); }
    .grade-badge {
      display: inline-flex; align-items: center; padding: 3px 9px;
      border-radius: 999px; font-size: 0.8rem; font-weight: 800;
    }
    .semester-list-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── Semester detail card ── */
    .semester-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .semester-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    /* ── Inputs ── */
    input[type="text"], input[type="number"] {
      width: 100%; padding: 7px 10px;
      border-radius: var(--rx); border: 1px solid var(--input-border);
      background: var(--input-bg); color: var(--text); font-size: .875rem;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

    .toggle {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 12px; border-radius: 999px;
      background: var(--input-bg); border: 1px solid var(--input-border);
      color: var(--text-soft); font-size: .8rem; white-space: nowrap;
      cursor: pointer; transition: border-color .15s;
    }
    .toggle:hover { border-color: var(--accent); }
    .toggle input { width: auto; accent-color: var(--accent); }

    /* ── Subjects ── */
    .semester-subjects { display: flex; flex-direction: column; gap: 12px; }

    .subject-card {
      background: var(--card-soft); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 14px 14px 18px;
      display: flex; flex-direction: column; gap: 10px;
      position: relative; overflow: hidden; transition: border-color .2s;
    }
    .subject-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--text-muted); border-radius: 4px 0 0 4px;
      transition: background .4s;
    }
    .subject-card.gc-fail::before  { background: var(--grade-fail); }
    .subject-card.gc-warn::before  { background: var(--grade-warn); }
    .subject-card.gc-lime::before  { background: var(--grade-lime); }
    .subject-card.gc-good::before  { background: var(--grade-good); }

    .subject-header {
      display: grid; grid-template-columns: 1fr; gap: 8px; align-items: start;
    }
    @media (min-width: 640px) { .subject-header { grid-template-columns: 1fr 155px auto; } }
    .subject-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

    /* ── Table ── */
    .table-scroll { overflow-x: auto; border-radius: var(--rs); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; min-width: 400px; }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 6px 6px; text-align: left; vertical-align: middle; color: var(--text);
    }
    tbody tr:last-child td { border-bottom: none; }
    th {
      color: var(--text-muted); font-weight: 600; font-size: .7rem;
      text-transform: uppercase; letter-spacing: .05em;
      background: rgba(0,0,0,.25); padding: 8px 6px;
    }

    .percent-wrapper { display: flex; align-items: center; gap: 5px; }
    .percent-wrapper span {
      padding: 3px 5px; background: var(--border); border-radius: var(--rx);
      font-size: .72rem; color: var(--text-muted); flex-shrink: 0;
    }

    /* ── Sub-evals ── */
    details {
      background: rgba(0,0,0,.25); border: 1px solid var(--border);
      border-radius: var(--rs); padding: 10px 12px; margin-top: 6px;
    }
    details > summary {
      cursor: pointer; color: var(--text-soft); font-weight: 600;
      font-size: .8rem; user-select: none; list-style: none;
    }
    details > summary::-webkit-details-marker { display: none; }
    .hint { color: var(--text-muted); font-size: .75rem; margin-top: 6px; line-height: 1.4; }

    /* ── Subject footer ── */
    .subject-footer {
      padding-top: 10px; border-top: 1px solid var(--border);
      display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start;
    }
    @media (max-width: 480px) { .subject-footer { grid-template-columns: 1fr; } }

    .subject-avg-label {
      font-size: .65rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px;
    }
    .subject-average {
      font-size: 1.5rem; font-weight: 900; line-height: 1;
      transition: color .4s;
    }
    .subject-average-sub { font-size: .72rem; color: var(--text-soft); margin-top: 3px; }

    .subject-footer-right {
      display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    }

    /* ── Progress bar ── */
    .progress-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .progress-bar {
      width: 110px; height: 5px; background: var(--border);
      border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: var(--accent); transition: width .35s, background .35s;
    }
    .progress-label { font-size: .7rem; color: var(--text-muted); }
    .progress-label.ok  { color: var(--success); }
    .progress-label.bad { color: var(--danger); }
    .progress-label.over{ color: var(--warning); }

    /* ── Needed grade box ── */
    .needed-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--rs); padding: 8px 12px;
      font-size: .78rem; color: var(--text-soft);
      min-width: 130px; text-align: right;
    }
    .needed-label { font-size: .65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
    .needed-value { font-size: 1.4rem; font-weight: 900; line-height: 1; transition: color .4s; }
    .needed-sub   { font-size: .68rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Tags ── */
    .tag { display:inline-block; padding:2px 7px; border-radius:999px; font-size:.68rem; font-weight:700; letter-spacing:.03em; }
    .tag-ok  { background:rgba(34,197,94,.12); color:var(--success); }
    .tag-bad { background:rgba(239,68,68,.12);  color:var(--danger);  }

    /* ── Semester footer ── */
    .semester-footer {
      margin-top: 4px; padding: 16px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between;
      align-items: flex-end; flex-wrap: wrap; gap: 12px;
    }
    .sem-footer-label { font-size: .68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
    .semester-average { font-size: 1.8rem; font-weight: 900; transition: color .4s; }
    .semester-average-sub { font-size: .78rem; color: var(--text-soft); margin-top: 2px; }

    /* ── Detail topbar ── */
    .detail-topbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
    }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 8px; z-index: 9999; pointer-events: none;
    }
    .toast {
      background: var(--card); border: 1px solid var(--border-light);
      border-radius: var(--r); padding: 10px 16px;
      font-size: .85rem; color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,.6);
      animation: tIn .2s ease, tOut .3s ease 2.5s forwards;
      pointer-events: auto;
    }
    .toast.ok  { border-color: rgba(34,197,94,.4); color: var(--success); }
    .toast.err { border-color: rgba(229,69,69,.4);  color: var(--danger); }
    @keyframes tIn  { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:none} }
    @keyframes tOut { from{opacity:1} to{opacity:0;pointer-events:none} }

    /* ── Empty state ── */
    .empty-msg { text-align: center; margin: 48px 0; color: var(--text-muted); }
    .empty-msg strong { display: block; font-size: 1.1rem; color: var(--text-soft); margin-bottom: 6px; }

    .view { margin-bottom: 16px; }
  </style>
</head>

<body>
  <div class="toast-container" id="toastContainer"></div>

  <div class="app">
    <div class="app-header">
      <h1>Promedios nms</h1>
      <p>Calculadora de notas universitarias — pasa con 4.0</p>
    </div>

    <div class="auth-bar">
      <div class="auth-status">
        <div class="sync-dot local" id="syncDot"></div>
        <span id="userInfo">Modo local (sin sesión)</span>
      </div>
      <div class="auth-right">
        <button class="btn-primary btn-mini" id="loginBtn">Iniciar sesión con Google</button>
        <button class="btn-secondary btn-mini" id="logoutBtn" style="display:none;">Cerrar sesión</button>
      </div>
    </div>

    <div id="viewList" class="view">
      <div class="top-bar">
        <button class="btn-primary" id="addSemesterBtn">+ Agregar semestre</button>
        <button class="btn-secondary" id="recalcAllBtn">Recalcular</button>
        <button class="btn-secondary" id="exportBtn">Exportar JSON</button>
        <label class="import-label">
          Importar JSON
          <input type="file" id="importFile" accept="application/json" style="display:none;">
        </label>
        <button class="btn-danger btn-mini" id="clearAllBtn">Borrar todo</button>
      </div>
      <div id="semesterList" class="semester-list"></div>
    </div>

    <div id="viewDetail" class="view" style="display:none;">
      <div class="detail-topbar">
        <button class="btn-ghost btn-mini" id="backBtn">← Volver</button>
        <button class="btn-danger btn-mini" id="deleteSemesterDetailBtn">Eliminar semestre</button>
      </div>
      <div id="semesterDetail"></div>
    </div>

    <div class="global-box">
      <div>
        <div class="global-stat-label">Promedio global exacto</div>
        <div class="global-stat-value" id="globalNormal">—</div>
        <div class="global-stat-sub">Sin redondear</div>
      </div>
      <div>
        <div class="global-stat-label">Promedio global redondeado</div>
        <div class="global-stat-value" id="globalRounded">—</div>
        <div class="global-stat-sub">Con 1 decimal por ramo</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    /* ── CONFIG ── */
    const firebaseConfig = {
      apiKey: "AIzaSyAcbTdLv_uULcoIHvtrp5nfoB1Q_m-ziDc",
      authDomain: "promedios-ubb.firebaseapp.com",
      projectId: "promedios-ubb",
      storageBucket: "promedios-ubb.firebasestorage.app",
      messagingSenderId: "170154498162",
      appId: "1:170154498162:web:d79694baf51cc25382caeb"
    };

    const LOCAL_KEY    = "promedios_semestres_clean_v2";
    const SAVE_DELAY   = 350;
    const GRADE_MIN    = 1.0;
    const GRADE_MAX    = 7.0;
    const PASS_GRADE   = 4.0;   // nota de aprobación
    const PCT_TOLERANCE = 1.0;

    /* ── FIREBASE ── */
    const appFB    = initializeApp(firebaseConfig);
    const auth     = getAuth(appFB);
    const provider = new GoogleAuthProvider();
    const db       = getFirestore(appFB);

    /* ── DOM ── */
    const viewList         = document.getElementById("viewList");
    const viewDetail       = document.getElementById("viewDetail");
    const semesterListEl   = document.getElementById("semesterList");
    const semesterDetailEl = document.getElementById("semesterDetail");
    const globalNormalEl   = document.getElementById("globalNormal");
    const globalRoundedEl  = document.getElementById("globalRounded");
    const syncDotEl        = document.getElementById("syncDot");
    const userInfoEl       = document.getElementById("userInfo");
    const loginBtn         = document.getElementById("loginBtn");
    const logoutBtn        = document.getElementById("logoutBtn");
    const addSemesterBtn   = document.getElementById("addSemesterBtn");
    const recalcAllBtn     = document.getElementById("recalcAllBtn");
    const clearAllBtn      = document.getElementById("clearAllBtn");
    const backBtn          = document.getElementById("backBtn");
    const delSemBtn        = document.getElementById("deleteSemesterDetailBtn");
    const exportBtn        = document.getElementById("exportBtn");
    const importFile       = document.getElementById("importFile");

    /* ── STATE ── */
    let currentUser = null;
    let semestersData = [];
    let selectedIdx = null;
    let saveTimer = null;
    let lightTimer = null;

    /* ──────────────────────────────
       HELPERS
    ────────────────────────────── */
    const uid = () => Math.random().toString(16).slice(2) + Date.now().toString(16);

    function round1(v) { return Math.round((v + Number.EPSILON) * 10) / 10; }
    function clamp(v, a, b) { return Math.min(Math.max(v, a), b); }
    function norm(s) { return String(s ?? "").replace(",", ".").trim(); }

    function parsePercent(s) {
      const v = parseFloat(norm(s));
      return Number.isFinite(v) ? clamp(v, 0, 100) : NaN;
    }

    function parseGrade(s) {
      const raw = norm(s);
      if (!raw) return NaN;
      let v = parseFloat(raw);
      if (!Number.isFinite(v)) return NaN;
      if (v > 7 && v <= 70) v = v / 10;
      return clamp(v, GRADE_MIN, GRADE_MAX);
    }

    function safeFixed(v, n = 2) { return Number.isFinite(v) ? v.toFixed(n) : "—"; }

    /* Grade class + color helpers */
    function gradeClass(g) {
      if (!Number.isFinite(g)) return "";
      if (g < 4.0) return "gc-fail";
      if (g < 5.0) return "gc-warn";
      if (g < 6.0) return "gc-lime";
      return "gc-good";
    }

    function gradeColor(g) {
      if (!Number.isFinite(g)) return "var(--text)";
      if (g < 4.0) return "var(--grade-fail)";
      if (g < 5.0) return "var(--grade-warn)";
      if (g < 6.0) return "var(--grade-lime)";
      return "var(--grade-good)";
    }

    /* Toast notification */
    function toast(msg, type = "") {
      const c = document.getElementById("toastContainer");
      const t = document.createElement("div");
      t.className = "toast" + (type ? " " + type : "");
      t.textContent = msg;
      c.append(t);
      setTimeout(() => t.remove(), 2900);
    }

    /* Sync dot state */
    function setSyncDot(state) {
      syncDotEl.className = "sync-dot " + state;
    }

    function showListView()   { viewList.style.display = "block";  viewDetail.style.display = "none"; }
    function showDetailView() { viewList.style.display = "none";   viewDetail.style.display = "block"; }

    function scheduleSave() {
      setSyncDot("saving");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => { await saveData(); setSyncDot(currentUser ? "synced" : "local"); }, SAVE_DELAY);
    }

    function scheduleLightRender() {
      clearTimeout(lightTimer);
      lightTimer = setTimeout(() => { renderSemesterList(); renderGlobalAverage(); }, 200);
    }

    /* ──────────────────────────────
       DATA FACTORIES
    ────────────────────────────── */
    const emptySubEval = () => ({ name: "", grade: "", percent: "" });
    const emptyEval    = () => ({ name: "", grade: "", percent: "", useSubs: false, subs: [emptySubEval()] });
    const emptySubject = () => ({ name: "", weight: "", evaluations: [emptyEval()] });
    const emptySemester= () => ({ id: uid(), name: "", useWeights: false, subjects: [emptySubject()] });

    /* ──────────────────────────────
       CALC
    ────────────────────────────── */
    function evalGrade(ev) {
      if (!ev?.useSubs) {
        const g = parseGrade(ev?.grade);
        // Si la nota principal está llena, usarla directamente
        if (Number.isFinite(g)) return g;
        // Si está vacía pero hay sub-evaluaciones con datos, calcular desde ellas
      }
      let tot = 0, w = 0;
      for (const s of (ev?.subs || [])) {
        const g = parseGrade(s.grade), p = parsePercent(s.percent);
        if (Number.isFinite(g) && Number.isFinite(p)) { tot += p; w += g * p; }
      }
      return tot > 0 ? w / tot : NaN;
    }

    function computeSubject(sub) {
      let tot = 0, w = 0;
      for (const ev of (sub.evaluations || [])) {
        const p = parsePercent(ev.percent), g = evalGrade(ev);
        if (Number.isFinite(p) && Number.isFinite(g)) { tot += p; w += g * p; }
      }
      if (!(tot > 0)) return { avg: null, rounded1: null, sumPercent: 0 };
      const avg = w / tot;
      return { avg, rounded1: round1(avg), sumPercent: tot };
    }

    /* Nota necesaria para aprobar (o llegar a `target`) con las evaluaciones pendientes */
    function computeNeeded(sub, target = PASS_GRADE) {
      let donePercent = 0, doneWeighted = 0;
      let pendingPercent = 0;

      for (const ev of (sub.evaluations || [])) {
        const p = parsePercent(ev.percent);
        if (!Number.isFinite(p) || p <= 0) continue;

        const g = evalGrade(ev);
        if (Number.isFinite(g)) {
          // Esta evaluación ya tiene nota
          donePercent   += p;
          doneWeighted  += g * p;
        } else {
          // Evaluación pendiente (tiene % pero no nota)
          pendingPercent += p;
        }
      }

      if (pendingPercent <= 1e-9) return null; // No hay pendientes

      // needed * pendingPercent + doneWeighted = target * (donePercent + pendingPercent)
      const totalPct = donePercent + pendingPercent;
      const needed   = (target * totalPct - doneWeighted) / pendingPercent;
      return needed;
    }

    function computeSemester(sem) {
      let sumN = 0, sumR = 0, c = 0, sumNW = 0, sumRW = 0, sumW = 0;
      for (const sub of (sem.subjects || [])) {
        const r = computeSubject(sub);
        if (r.avg !== null) {
          c++;
          sumN += r.avg; sumR += r.rounded1;
          const wv = parseFloat(norm(sub.weight));
          const ww = (sem.useWeights && Number.isFinite(wv) && wv > 0) ? wv : 1;
          sumW += ww; sumNW += r.avg * ww; sumRW += r.rounded1 * ww;
        }
      }
      if (!c) return null;
      if (sem.useWeights) return { normal: sumNW / sumW, rounded: sumRW / sumW };
      return { normal: sumN / c, rounded: sumR / c };
    }

    function computeGlobal() {
      let sumN = 0, sumR = 0, c = 0, sumNW = 0, sumRW = 0, sumW = 0;
      for (const sem of semestersData) {
        for (const sub of (sem.subjects || [])) {
          const r = computeSubject(sub);
          if (r.avg !== null) {
            c++;
            sumN += r.avg; sumR += r.rounded1;
            const wv = parseFloat(norm(sub.weight));
            const ww = (sem.useWeights && Number.isFinite(wv) && wv > 0) ? wv : 1;
            sumW += ww; sumNW += r.avg * ww; sumRW += r.rounded1 * ww;
          }
        }
      }
      if (!c) return null;
      const anyWeights = Math.abs(sumW - c) > 1e-9;
      if (anyWeights) return { normal: sumNW / sumW, rounded: sumRW / sumW };
      return { normal: sumN / c, rounded: sumR / c };
    }

    /* ──────────────────────────────
       STORAGE / SYNC
    ────────────────────────────── */
    function loadFromLocal() {
      try {
        const raw = localStorage.getItem(LOCAL_KEY);
        if (!raw) return { semesters: [], updatedAtLocal: 0 };
        const d = JSON.parse(raw);
        return { semesters: Array.isArray(d.semesters) ? d.semesters : [], updatedAtLocal: d.updatedAtLocal || 0 };
      } catch { return { semesters: [], updatedAtLocal: 0 }; }
    }

    async function loadFromRemote(user) {
      try {
        const snap = await getDoc(doc(db, "promedios_semestres", user.uid));
        if (!snap.exists()) return null;
        const d = snap.data();
        return {
          semesters: Array.isArray(d.semesters) ? d.semesters : [],
          updatedAtLocal: d.updatedAtLocal || 0,
          updatedAtRemoteMs: d.updatedAt?.toMillis?.() || 0
        };
      } catch (e) { console.error("Firestore load:", e); return null; }
    }

    async function saveData() {
      const payload = { semesters: semestersData, updatedAtLocal: Date.now() };
      localStorage.setItem(LOCAL_KEY, JSON.stringify(payload));
      if (!currentUser) return;
      try {
        await setDoc(doc(db, "promedios_semestres", currentUser.uid), {
          semesters: semestersData,
          updatedAtLocal: payload.updatedAtLocal,
          updatedAt: serverTimestamp()
        }, { merge: true });
      } catch (e) { console.error("Firestore save:", e); }
    }

    async function clearRemote() {
      if (!currentUser) return;
      try {
        await setDoc(doc(db, "promedios_semestres", currentUser.uid), {
          semesters: [], updatedAtLocal: Date.now(), updatedAt: serverTimestamp()
        }, { merge: true });
      } catch (e) { console.error("Firestore clear:", e); }
    }

    function buildSubjectCard(parent, data = emptySubject()) {
      const card = document.createElement("div");
      card.className = "subject-card";

      /* header */
      const hdr = document.createElement("div");
      hdr.className = "subject-header";

      const nameIn = document.createElement("input");
      nameIn.type = "text";
      nameIn.placeholder = "Nombre asignatura";
      nameIn.value = data.name || "";
      nameIn.oninput = syncDetailToData;

      const wtIn = document.createElement("input");
      wtIn.type = "text";
      wtIn.inputMode = "decimal";
      wtIn.placeholder = "Créditos/peso (opc.)";
      wtIn.value = data.weight ?? "";
      wtIn.oninput = syncDetailToData;

      const acts = document.createElement("div");
      acts.className = "subject-actions";

      const addEv = document.createElement("button");
      addEv.className = "btn-secondary btn-mini";
      addEv.textContent = "+ Nota";
      addEv.onclick = () => { addEvalRow(tbody, emptyEval()); syncDetailToData(); };

      const delSubBtn = document.createElement("button");
      delSubBtn.className = "btn-danger btn-mini";
      delSubBtn.textContent = "Eliminar ramo";
      delSubBtn.onclick = () => { if (!confirm("¿Eliminar ramo?")) return; card.remove(); syncDetailToData(); };

      acts.append(addEv, delSubBtn);
      hdr.append(nameIn, wtIn, acts);

      /* table */
      const wrap = document.createElement("div");
      wrap.className = "table-scroll";

      const table = document.createElement("table");
      table.innerHTML = `<thead><tr>
        <th style="width:28%">Evaluación</th>
        <th style="width:20%">Nota</th>
        <th style="width:19%">%</th>
        <th style="width:13%">Dividir</th>
        <th style="width:20%">Acción</th>
      </tr></thead>`;
      const tbody = document.createElement("tbody");
      table.append(tbody);
      wrap.append(table);

      (data.evaluations?.length ? data.evaluations : [emptyEval()]).forEach(ev => addEvalRow(tbody, ev));

      /* footer */
      const footer = document.createElement("div");
      footer.className = "subject-footer";
      footer.innerHTML = `
        <div>
          <div class="subject-avg-label">Promedio asignatura</div>
          <div class="subject-average">—</div>
          <div class="subject-average-sub"></div>
        </div>
        <div class="subject-footer-right">
          <div class="needed-box">
            <div class="needed-label">Necesitas para aprobar</div>
            <div class="needed-value">—</div>
            <div class="needed-sub"></div>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
            <span class="progress-label">0%</span>
          </div>
        </div>
      `;

      card.append(hdr, wrap, footer);
      parent.append(card);
    }

    function addEvalRow(tbody, evData) {
      const tr = document.createElement("tr");

      const makeCell = (child) => { const td = document.createElement("td"); td.append(child); return td; };

      const nIn = document.createElement("input");
      nIn.type = "text"; nIn.placeholder = "Test / Certamen"; nIn.value = evData.name || "";
      nIn.oninput = syncDetailToData;

      const gIn = document.createElement("input");
      gIn.type = "text"; gIn.inputMode = "decimal"; gIn.placeholder = "Ej: 55 ó 5,5";
      gIn.value = evData.grade ?? ""; gIn.oninput = syncDetailToData;

      const pWrap = document.createElement("div");
      pWrap.className = "percent-wrapper";
      const pIn = document.createElement("input");
      pIn.type = "text"; pIn.inputMode = "decimal"; pIn.placeholder = "Ej: 30";
      pIn.value = evData.percent ?? ""; pIn.oninput = syncDetailToData;
      const pSpan = document.createElement("span"); pSpan.textContent = "%";
      pWrap.append(pIn, pSpan);

      const splitCb = document.createElement("input");
      splitCb.type = "checkbox"; splitCb.checked = !!evData.useSubs;
      splitCb.onchange = () => { detailsEl.open = splitCb.checked; syncDetailToData(); };

      const delBtn = document.createElement("button");
      delBtn.className = "btn-danger btn-mini"; delBtn.textContent = "✕";
      delBtn.onclick = () => {
        if (!confirm("¿Eliminar evaluación?")) return;
        const next = tr.nextSibling;
        tr.remove();
        if (next?.querySelector?.("details")) next.remove();
        syncDetailToData();
      };

      tr.append(makeCell(nIn), makeCell(gIn), makeCell(pWrap), makeCell(splitCb), makeCell(delBtn));

      /* Sub-eval row */
      const detailsRow = document.createElement("tr");
      const detailsTd  = document.createElement("td");
      detailsTd.colSpan = 5;

      const detailsEl = document.createElement("details");
      detailsEl.open = !!evData.useSubs;

      const summary = document.createElement("summary");
      summary.textContent = "Sub-evaluaciones (opcional)";

      const hint = document.createElement("div");
      hint.className = "hint";
      hint.textContent = "Divide esta evaluación en partes internas con su % interno y sus notas.";

      const subTable = document.createElement("table");
      subTable.innerHTML = `<thead><tr>
        <th style="width:35%">Nombre</th><th style="width:25%">Nota</th><th style="width:25%">% interno</th><th style="width:15%">—</th>
      </tr></thead>`;
      const subTbody = document.createElement("tbody");
      subTable.append(subTbody);

      (evData.subs?.length ? evData.subs : [emptySubEval()]).forEach(s => addSubRow(subTbody, s));

      const subBtns = document.createElement("div");
      subBtns.style.cssText = "display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;";

      const addSubBtn = document.createElement("button");
      addSubBtn.className = "btn-secondary btn-mini"; addSubBtn.textContent = "+ Sub";
      addSubBtn.onclick = () => { splitCb.checked = true; detailsEl.open = true; addSubRow(subTbody, emptySubEval()); syncDetailToData(); };

      const clrSub = document.createElement("button");
      clrSub.className = "btn-danger btn-mini"; clrSub.textContent = "Borrar subs";
      clrSub.onclick = () => {
        if (!confirm("¿Borrar sub-evaluaciones?")) return;
        subTbody.innerHTML = ""; addSubRow(subTbody, emptySubEval());
        splitCb.checked = true; detailsEl.open = true; syncDetailToData();
      };

      subBtns.append(addSubBtn, clrSub);
      detailsEl.append(summary, hint, subTable, subBtns);
      detailsTd.append(detailsEl);
      detailsRow.append(detailsTd);
      tbody.append(tr, detailsRow);

      if (!splitCb.checked) detailsEl.open = false;
    }

    function addSubRow(subTbody, subData) {
      const tr = document.createElement("tr");
      const mkC = (el) => { const td = document.createElement("td"); td.append(el); return td; };

      const nI = document.createElement("input"); nI.type="text"; nI.placeholder="Ej: Test 1"; nI.value=subData.name??""; nI.oninput=syncDetailToData;
      const gI = document.createElement("input"); gI.type="text"; gI.inputMode="decimal"; gI.placeholder="Ej: 55 ó 5,5"; gI.value=subData.grade??""; gI.oninput=syncDetailToData;

      const pW = document.createElement("div"); pW.className="percent-wrapper";
      const pI = document.createElement("input"); pI.type="text"; pI.inputMode="decimal"; pI.placeholder="Ej: 25"; pI.value=subData.percent??""; pI.oninput=syncDetailToData;
      const pS = document.createElement("span"); pS.textContent="%";
      pW.append(pI, pS);

      const dB = document.createElement("button"); dB.className="btn-danger btn-mini"; dB.textContent="✕";
      dB.onclick = () => { tr.remove(); syncDetailToData(); };

      tr.append(mkC(nI), mkC(gI), mkC(pW), mkC(dB));
      subTbody.append(tr);
    }

    /* ──────────────────────────────
       SYNC UI → DATA
    ────────────────────────────── */
    function syncDetailToData(initial = false) {
      if (selectedIdx === null) return;
      const sem  = semestersData[selectedIdx];
      const root = semesterDetailEl.querySelector(".semester-card");
      if (!root || !sem) return;

      sem.name = root.querySelector(".semester-header input[type='text']").value;
      sem.useWeights = !!root.querySelector(".toggle input[type='checkbox']").checked;

      const subjects = [];
      for (const sc of root.querySelectorAll(".subject-card")) {
        const hInputs = sc.querySelectorAll(".subject-header input");
        const sub = { name: hInputs[0]?.value ?? "", weight: hInputs[1]?.value ?? "", evaluations: [] };

        const rows = Array.from(sc.querySelectorAll("tbody > tr"));
        for (let i = 0; i < rows.length; i++) {
          const r = rows[i];
          const tds = r.querySelectorAll("td");
          if (tds.length === 5) {
            const evName    = tds[0].querySelector("input")?.value ?? "";
            const evGrade   = tds[1].querySelector("input")?.value ?? "";
            const evPercent = tds[2].querySelector("input")?.value ?? "";
            const evUseSubs = tds[3].querySelector("input[type='checkbox']")?.checked ?? false;

            const detailsRow = rows[i + 1];
            let subs = [];
            if (detailsRow) {
              subs = Array.from(detailsRow.querySelectorAll("tbody tr")).map(sr => {
                const ins = sr.querySelectorAll("input");
                return { name: ins[0]?.value ?? "", grade: ins[1]?.value ?? "", percent: ins[2]?.value ?? "" };
              });
            }

            sub.evaluations.push({ name: evName, grade: evGrade, percent: evPercent,
              useSubs: !!evUseSubs, subs: subs.length ? subs : [emptySubEval()] });
            i++;
          }
        }
        subjects.push(sub);

        /* ── Update subject card UI ── */
        const res = computeSubject(sub);

        // Left border color
        sc.className = "subject-card" + (res.avg !== null ? " " + gradeClass(res.avg) : "");

        // Average display
        const avgEl  = sc.querySelector(".subject-average");
        const avgSub = sc.querySelector(".subject-average-sub");
        if (res.avg !== null) {
          avgEl.textContent = safeFixed(res.rounded1, 1);
          avgEl.style.color = gradeColor(res.rounded1);
          avgSub.textContent = `Exacto: ${safeFixed(res.avg, 2)}`;
        } else {
          avgEl.textContent = "—"; avgEl.style.color = ""; avgSub.textContent = "";
        }

        // Progress bar
        const sumP   = res.sumPercent || 0;
        const fill   = sc.querySelector(".progress-fill");
        const pLabel = sc.querySelector(".progress-label");
        if (fill) {
          const pct = Math.min(sumP, 100);
          fill.style.width = pct + "%";
          const over = sumP > 100 + PCT_TOLERANCE;
          const ok   = Math.abs(sumP - 100) <= PCT_TOLERANCE;
          fill.style.background = ok ? "var(--success)" : over ? "var(--danger)" : "var(--accent)";
          pLabel.textContent = safeFixed(sumP, 1) + "%" + (ok ? " ✓" : "");
          pLabel.className   = "progress-label" + (ok ? " ok" : over ? " bad" : "");
        }

        // Needed grade box
        const neededVal = sc.querySelector(".needed-value");
        const neededSub = sc.querySelector(".needed-sub");
        if (neededVal) {
          const needed = computeNeeded(sub);
          if (needed === null) {
            // No hay evaluaciones pendientes
            if (res.avg !== null) {
              neededVal.textContent = res.avg >= PASS_GRADE ? "✓" : "✗";
              neededVal.style.color = res.avg >= PASS_GRADE ? "var(--success)" : "var(--danger)";
              neededSub.textContent = res.avg >= PASS_GRADE ? "Aprobado" : "Reprobado";
            } else {
              neededVal.textContent = "—"; neededVal.style.color = ""; neededSub.textContent = "";
            }
          } else if (needed <= 1.0) {
            neededVal.textContent = "✓";
            neededVal.style.color = "var(--success)";
            neededSub.textContent = "Ya aprobado";
          } else if (needed > GRADE_MAX) {
            neededVal.textContent = "Impos.";
            neededVal.style.color = "var(--grade-fail)";
            neededSub.textContent = "No alcanza con 7.0";
          } else {
            neededVal.textContent = needed.toFixed(1);
            neededVal.style.color = gradeColor(needed);
            neededSub.textContent = `en notas faltantes`;
          }
        }
      }

      sem.subjects = subjects;

      /* ── Semester footer ── */
      const semAvg = computeSemester(sem);
      const semAvgEl  = root.querySelector(".semester-average");
      const semAvgSub = root.querySelector(".semester-average-sub");
      if (semAvg) {
        semAvgEl.textContent = safeFixed(semAvg.rounded, 1);
        semAvgEl.style.color = gradeColor(semAvg.rounded);
        semAvgSub.textContent = `Exacto: ${safeFixed(semAvg.normal, 2)}`;
      } else {
        semAvgEl.textContent = "—"; semAvgEl.style.color = ""; semAvgSub.textContent = "";
      }

      scheduleSave();
      scheduleLightRender();
    }

    /* ──────────────────────────────
       GLOBAL AVERAGE
    ────────────────────────────── */
    function renderGlobalAverage() {
      const g = computeGlobal();
      if (!g) {
        globalNormalEl.textContent = "—"; globalNormalEl.style.color = "";
        globalRoundedEl.textContent = "—"; globalRoundedEl.style.color = "";
        return;
      }
      globalNormalEl.textContent  = safeFixed(g.normal, 2);
      globalNormalEl.style.color  = gradeColor(g.normal);
      globalRoundedEl.textContent = safeFixed(g.rounded, 1);
      globalRoundedEl.style.color = gradeColor(g.rounded);
    }

    /* ──────────────────────────────
       AUTH
    ────────────────────────────── */
    loginBtn.onclick  = () => signInWithPopup(auth, provider).catch(e => { console.error(e); toast("No se pudo iniciar sesión.", "err"); });
    logoutBtn.onclick = () => signOut(auth);

    onAuthStateChanged(auth, async (u) => {
      currentUser = u;
      if (u) {
        loginBtn.style.display = "none"; logoutBtn.style.display = "inline-block";
        userInfoEl.textContent = "Google: " + (u.displayName || u.email);
        setSyncDot("saving");
      } else {
        loginBtn.style.display = "inline-block"; logoutBtn.style.display = "none";
        userInfoEl.textContent = "Modo local";
        setSyncDot("local");
      }

      const local = loadFromLocal();
      if (!u) {
        semestersData = local.semesters || [];
        renderSemesterList(); renderGlobalAverage(); showListView(); return;
      }

      const remote  = await loadFromRemote(u);
      const localTs = local.updatedAtLocal || 0;
      const remotTs = remote ? Math.max(remote.updatedAtLocal || 0, remote.updatedAtRemoteMs || 0) : 0;

      if (!remote) {
        semestersData = local.semesters || [];
        await saveData();
      } else if (localTs > remotTs) {
        semestersData = local.semesters || [];
        await saveData();
      } else {
        semestersData = remote.semesters || [];
        localStorage.setItem(LOCAL_KEY, JSON.stringify({ semesters: semestersData, updatedAtLocal: Date.now() }));
      }

      setSyncDot("synced");
      renderSemesterList(); renderGlobalAverage(); showListView();
    });

    /* ──────────────────────────────
       BUTTONS
    ────────────────────────────── */
    addSemesterBtn.onclick = () => {
      semestersData.push(emptySemester());
      scheduleSave(); renderSemesterList(); renderGlobalAverage();
    };

    recalcAllBtn.onclick = () => {
      renderSemesterList(); renderGlobalAverage();
      if (viewDetail.style.display === "block") renderSemesterDetail();
    };

    clearAllBtn.onclick = async () => {
      if (!confirm("¿Borrar todo? Esta acción no se puede deshacer.")) return;
      semestersData = [];
      localStorage.removeItem(LOCAL_KEY);
      await clearRemote();
      renderSemesterList(); renderGlobalAverage(); showListView();
    };

    backBtn.onclick = () => { syncDetailToData(); showListView(); };

    delSemBtn.onclick = async () => {
      if (!confirm("¿Eliminar semestre?")) return;
      semestersData.splice(selectedIdx, 1);
      selectedIdx = null;
      await saveData();
      renderSemesterList(); renderGlobalAverage(); showListView();
    };

    /* ──────────────────────────────
       EXPORT / IMPORT
    ────────────────────────────── */
    exportBtn.onclick = () => {
      const blob = new Blob([JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), semesters: semestersData }, null, 2)], { type: "application/json" });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement("a"), { href: url, download: "promedios_backup.json" });
      a.click(); URL.revokeObjectURL(url);
      toast("Exportado correctamente ✓", "ok");
    };

    importFile.onchange = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const data     = JSON.parse(await file.text());
        const imported = Array.isArray(data.semesters) ? data.semesters : null;
        if (!imported) { toast("JSON inválido (falta 'semesters')", "err"); return; }
        if (!confirm("Esto reemplazará tus datos actuales. ¿Continuar?")) return;
        semestersData = imported;
        await saveData();
        renderSemesterList(); renderGlobalAverage(); showListView();
        toast("Importado correctamente ✓", "ok");
      } catch (err) {
        console.error(err);
        toast("No se pudo importar el archivo.", "err");
      } finally { importFile.value = ""; }
    };

    /* ──────────────────────────────
       BOOTSTRAP
    ────────────────────────────── */
    (function init() {
      const local = loadFromLocal();
      semestersData = local.semesters || [];
      renderSemesterList(); renderGlobalAverage(); showListView();
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () =>
        navigator.serviceWorker.register('/Promedionotas/sw.js').catch(e => console.log('SW:', e))
      );
    }
  </script>
</body>
</html>
